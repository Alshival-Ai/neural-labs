services:
  neural-labs:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./.env:/app/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NEURAL_LABS_WORKSPACE_BACKEND=docker
    init: true
    restart: unless-stopped
