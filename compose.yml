services:
  neural-labs:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./.env:/app/.env:ro
      - auth-data:/app/data/auth
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    environment:
      - NEURAL_LABS_WORKSPACE_BACKEND=docker
      - NEURAL_LABS_WORKSPACE_IMAGE=${NEURAL_LABS_WORKSPACE_IMAGE:-neural-labs-workspace:latest}
      - NEURAL_LABS_WORKSPACE_NETWORK=${NEURAL_LABS_WORKSPACE_NETWORK:-neural-labs-workspaces}
      - NEURAL_LABS_VSCODE_PORT=${NEURAL_LABS_VSCODE_PORT:-13337}
      - NEURAL_LABS_VSCODE_ENABLED=${NEURAL_LABS_VSCODE_ENABLED:-true}
    init: true
    restart: unless-stopped
    networks:
      - workspaces

volumes:
  auth-data:

networks:
  workspaces:
    name: ${NEURAL_LABS_WORKSPACE_NETWORK:-neural-labs-workspaces}
